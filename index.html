<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">

<!-- CORREÇÃO DO ZOOM NO IPHONE/ANDROID -->
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Convite - Missão Especial</title>

<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{

    width:100%;
    min-height:100%;

    overflow-x:hidden;

    -webkit-text-size-adjust:100%;

}

body{

    font-family:'Montserrat', sans-serif;

    background: radial-gradient(circle, #1e90ff, #0b1a2b);

    display:flex;
    justify-content:center;
    align-items:center;

    min-height:100vh;

    position:relative;

    padding:20px;

}

/* ===================================
   POSIÇÃO DO HOMEM-ARANHA
=================================== */

:root{

    /* SOBE E DESCE */
    --spider-top: -140px;

    /* ESQUERDA E DIREITA */
    --spider-left: 70%;

    /* TAMANHO */
    --spider-size: 70px;

}

/* ===================================
   HOMEM-ARANHA BALANÇANDO
=================================== */

.spiderman-container{

    position:absolute;

    top:var(--spider-top);

    left:var(--spider-left);

    transform-origin: top center;

    animation: balancar 3.5s ease-in-out infinite;

    z-index:20;

}

/* TEIA */

.teia{

    position:absolute;

    top:0;
    left:50%;

    width:3px;

    height:240px;

    background:white;

    transform:translateX(-50%);

}

/* IMAGEM */

.spiderman-passando{

    width:var(--spider-size);

    position:relative;

    top:220px;

    left:50%;

    transform:translateX(-50%);

    display:block;

    filter:drop-shadow(0 0 12px rgba(0,0,0,.5));

}

/* ANIMAÇÃO */

@keyframes balancar{

    0%{
        transform:rotate(-18deg);
    }

    50%{
        transform:rotate(18deg);
    }

    100%{
        transform:rotate(-18deg);
    }

}

/* ===================================
   MASCARA NO CANTO
=================================== */

.spiderman-canto{

    position:fixed;

    bottom:-10px;
    right:-10px;

    width:160px;

    z-index:9999;

    filter:drop-shadow(0 0 15px rgba(0,0,0,.6));

    animation:flutuar 3s ease-in-out infinite;

}

@keyframes flutuar{

    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-10px);
    }

    100%{
        transform:translateY(0px);
    }

}

/* ===================================
   CONVITE
=================================== */

.convite{

    width:380px;

    max-width:100%;

    background:#fff;

    border:6px solid #000;

    box-shadow:10px 10px 0 #000;

    padding:20px;

    position:relative;

    z-index:5;

    border-radius:10px;

}

.titulo{

    font-family:'Bangers', cursive;

    font-size:36px;

    text-align:center;

    color:#e60023;

    text-shadow:3px 3px 0 #000;

}

.nome{

    text-align:center;

    font-size:26px;

    font-weight:bold;

    margin:10px 0;

}

.balao{

    background:#ffeb3b;

    border:3px solid #000;

    padding:10px;

    text-align:center;

    font-weight:bold;

    margin:10px 0;

    border-radius:8px;

}

.data{

    background:#e60023;

    color:#fff;

    padding:10px;

    text-align:center;

    border:3px solid #000;

    margin:10px 0;

    border-radius:8px;

}

.info{

    text-align:center;

    font-weight:bold;

}

/* ===================================
   INPUT CORRIGIDO
=================================== */

input{

    width:100%;

    padding:14px;

    margin-top:15px;

    border:2px solid #000;

    border-radius:8px;

    outline:none;

    font-size:16px;

    /* EVITA ZOOM IOS */
    appearance:none;
    -webkit-appearance:none;

}

/* BOTÕES */

button{

    width:100%;

    padding:12px;

    margin-top:10px;

    color:#fff;

    border:3px solid #000;

    font-weight:bold;

    cursor:pointer;

    transition:.3s;

    border-radius:8px;

    font-size:15px;

}

/* BOTÃO CONFIRMAR */

.btn-confirmar{

    background:#25D366;

}

.btn-confirmar:hover{

    background:#128C7E;

    transform:scale(1.02);

}

/* BOTÃO LOCALIZAÇÃO */

.btn-local{

    background:#e60023;

}

.btn-local:hover{

    background:#b8001c;

    transform:scale(1.02);

}

/* ===================================
   RESPONSIVO
=================================== */

@media(max-width:500px){

    :root{

        --spider-size:120px;

    }

    body{

        padding:15px;

    }

    .convite{

        width:100%;

    }

    .teia{

        height:180px;

    }

    .spiderman-passando{

        top:160px;

    }

    .spiderman-canto{

        width:140px;

    }

}

</style>
</head>

<body>

<!-- ===================================
     HOMEM-ARANHA BALANÇANDO
=================================== -->

<div class="spiderman-container">

    <!-- TEIA -->
    <div class="teia"></div>

    <!-- HOMEM-ARANHA -->
    <img
    class="spiderman-passando"
    src="image/hOMEM ARANHA.png">

</div>

<!-- ===================================
     MASCARA NO CANTO
=================================== -->

<img
class="spiderman-canto"
src="image/Mascara.png">

<!-- ===================================
     CONVITE
=================================== -->

<div class="convite">

    <div class="titulo">
        MISSÃO ESPECIAL
    </div>

    <div class="nome">
        RAFAEL DE FRANÇA
    </div>

    <div class="balao">
        Prepare-se! Uma grande aventura está prestes a começar! 🕷️
    </div>

    <div class="data">
        🗓 24/05<br>
        ⏰ 14:30<br>
        🎂 3 ANOS
    </div>

    <div class="info">
        Digite seu nome para ativar sua identidade secreta
    </div>

    <input
    type="text"
    id="nome"
    placeholder="Digite seu nome">

    <!-- BOTÃO CONFIRMAR -->
    <button
    class="btn-confirmar"
    onclick="confirmar()">

        CONFIRMAR PRESENÇA 🕷️

    </button>

    <!-- BOTÃO LOCALIZAÇÃO -->
    <button
    class="btn-local"
    onclick="abrirMapa()">

        📍 ABRIR ROTA PARA A FESTA

    </button>

</div>

<script>

/* ===================================
   CONFIRMAR PRESENÇA
=================================== */

function confirmar(){

    let nome =
    document.getElementById("nome").value;

    if(nome === ""){

        alert("Digite seu nome!");

        return;

    }

    let lista =
    JSON.parse(
        localStorage.getItem("confirmados")
    ) || [];

    lista.push(nome);

    localStorage.setItem(
        "confirmados",
        JSON.stringify(lista)
    );

    alert("Presença confirmada!");

    document.getElementById("nome").value = "";

}

/* ===================================
   ABRIR ROTA GOOGLE MAPS
=================================== */

function abrirMapa(){

    window.open(
        "https://maps.app.goo.gl/NTfTS4GVQGiPkmqb9",
        "_blank"
    );

}

</script>

</body>
</html>
